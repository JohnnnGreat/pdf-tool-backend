worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---------------------------------------------------------------------------
    # Logging
    # ---------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # ---------------------------------------------------------------------------
    # Performance
    # ---------------------------------------------------------------------------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # ---------------------------------------------------------------------------
    # Gzip compression
    # ---------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/x-font-ttf
        font/opentype
        image/svg+xml;

    # ---------------------------------------------------------------------------
    # Rate limiting zones
    # ---------------------------------------------------------------------------
    # General API rate limit — 20 requests/second per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
    # Stricter limit for auth endpoints — 5 requests/second per IP
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

    # ---------------------------------------------------------------------------
    # File upload size — must match MAX_FILE_SIZE_MB in .env.prod
    # Set to 55m to give 5m headroom above the 50m app limit
    # ---------------------------------------------------------------------------
    client_max_body_size 55m;
    client_body_buffer_size 1m;

    # ---------------------------------------------------------------------------
    # Timeouts — generous because PDF conversion can take up to 2 minutes
    # ---------------------------------------------------------------------------
    proxy_connect_timeout   15s;
    proxy_send_timeout      120s;
    proxy_read_timeout      120s;
    send_timeout            120s;

    # ---------------------------------------------------------------------------
    # Include per-site config
    # ---------------------------------------------------------------------------
    include /etc/nginx/conf.d/*.conf;
}
