# =============================================================================
# DocForge — Nginx site configuration
#
# Replace YOUR_DOMAIN with your actual domain (e.g. api.docforge.com)
# Replace the ssl_certificate paths once you have Certbot certs.
# =============================================================================

upstream docforge_app {
    server app:8000;
    keepalive 32;
}

# ---------------------------------------------------------------------------
# HTTP — redirect all traffic to HTTPS
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Certbot ACME challenge (for Let's Encrypt certificate renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS — main site
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # ---- TLS ----
    # Replace with your actual cert paths from Certbot or your CA
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # HSTS — tells browsers to always use HTTPS (6 months)
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

    # ---- Security headers ----
    add_header X-Frame-Options           "SAMEORIGIN"              always;
    add_header X-Content-Type-Options    "nosniff"                 always;
    add_header X-XSS-Protection          "1; mode=block"           always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ---- File upload size (mirrors nginx.conf global setting) ----
    client_max_body_size 55m;

    # ---- Auth endpoints — stricter rate limiting ----
    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass         http://docforge_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
    }

    # ---- All other API endpoints ----
    location /api/ {
        limit_req zone=api_limit burst=40 nodelay;
        limit_req_status 429;

        proxy_pass         http://docforge_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Disable buffering for streaming responses (e.g. AI SSE)
        proxy_buffering    off;
        proxy_cache_bypass $http_upgrade;
    }

    # ---- Health check (no rate limit, used by load balancers) ----
    location /api/v1/health {
        proxy_pass       http://docforge_app;
        proxy_set_header Host $host;
        access_log       off;
    }

    # ---- Swagger / ReDoc docs (restrict in prod if needed) ----
    location /docs {
        proxy_pass       http://docforge_app;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass       http://docforge_app;
        proxy_set_header Host $host;
    }

    # ---- Deny hidden files ----
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
