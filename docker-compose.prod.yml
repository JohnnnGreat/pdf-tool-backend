# =============================================================================
# PRODUCTION — docker-compose.prod.yml
#
# Usage:
#   # First time / after code changes:
#   docker compose -f docker-compose.prod.yml up -d --build
#
#   # View logs:
#   docker compose -f docker-compose.prod.yml logs -f app
#
#   # Stop (keeps volumes):
#   docker compose -f docker-compose.prod.yml down
#
# Prerequisites:
#   - Copy .env.prod.example → .env.prod and fill in ALL values.
#   - Nginx serves on port 80/443. Certbot volume is pre-populated with certs.
# =============================================================================

name: docforge-prod

services:

  # ---------------------------------------------------------------------------
  # FastAPI application (production — Gunicorn + Uvicorn workers)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: docforge-backend:latest
    container_name: docforge-app
    env_file:
      - .env.prod
    environment:
      # Points at the compose postgres service
      DATABASE_URL: postgresql://docforge:${POSTGRES_PASSWORD}@db:5432/docforge
      REDIS_URL: redis://redis:6379/0
      TESSERACT_PATH: /usr/bin/tesseract
      LIBREOFFICE_PATH: /usr/bin/libreoffice
      UPLOAD_DIR: /app/uploads
      OUTPUT_DIR: /app/outputs
      DEBUG: "false"
    volumes:
      - uploads_data:/app/uploads
      - outputs_data:/app/outputs
    expose:
      # Only exposed to Nginx internally, not to the host
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: docforge-db
    env_file:
      - .env.prod
    environment:
      POSTGRES_USER: docforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: docforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # NOT exposed to the host — only reachable by app inside the compose network
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docforge -d docforge"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Redis 7 (rate limiting + caching)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: docforge-redis
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    env_file:
      - .env.prod
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    restart: always
    deploy:
      resources:
        limits:
          memory: 320M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Nginx — reverse proxy, TLS termination, static file serving, rate limiting
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: docforge-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # TLS certificates (populate with Certbot or your CA)
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - app
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  outputs_data:
  nginx_logs:
  certbot_certs:
  certbot_webroot:
